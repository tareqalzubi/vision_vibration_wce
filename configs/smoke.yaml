seed: 7
output_dir: outputs/smoke

data:
  root: data/smoke
  manifest: data/smoke/manifest.csv
  train_split: train
  val_split: val
  test_split: test
  image_size: [64, 64]
  vibration_length: 240
  vibration_channels: 6
  num_workers: 0

model:
  image_channels: 3
  encoder_channels: [8, 16, 32, 64]
  descriptor_dim: 32
  fusion_type: frequency
  rho_mode: adaptive
  fixed_rho: 1.0
  vibration_encoder: two_stream_mlstm_se
  pose_scale: 0.01
  min_depth: 0.05
  max_depth: 10.0

training:
  epochs: 1
  batch_size: 2
  lr: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  amp: false
  log_interval: 1
  patience: 3
  loss_weights:
    intensity: 1.0
    smoothness: 0.001
    geometry: 0.1
  photometric_kappa: 0.85

evaluation:
  median_scale: true
  vibration_tertiles: true
